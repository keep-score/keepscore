<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cluses Billard Club – Choix de table</title>

  <style>
    :root {
      --bg: #050505;
      --text: #f5f5f5;
      --muted: #c8c8c8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 6px 10px 10px;
    }

    .app {
      width: 100%;
      max-width: 1300px;
      margin: 0 auto;
    }

    .top-logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4px 0 10px;
    }

    .top-logo {
      max-width: 110px;
      width: 20vw;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.35));
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.2rem, 2vw, 1.9rem);
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 14px;
      font-size: clamp(0.85rem, 1.3vw, 1rem);
    }

    .setup {
      display: grid;
      gap: 14px;
      max-width: 540px;
      margin: 0 auto;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px;
    }

    .table-buttons {
      display: grid;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      background: #2b2b2b;
      color: white;
      transition: 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      background: #383838;
    }

    button:active {
      transform: translateY(0);
    }

    .status {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="app">

    <div class="top-logo-wrap">
      <img src="https://raw.githubusercontent.com/keep-score/keepscore/refs/heads/main/cluses-billard-club.png" class="top-logo">
    </div>

    <h1>Cluses Billard Club</h1>
    <div class="subtitle">Choisissez une table</div>

    <div class="setup">
      <div class="table-buttons">
        <button onclick="goTable1()">Table 1</button>
        <button onclick="goTable3()">Table 3</button>
      </div>
    </div>

    <div class="status">
      Gestion du score en direct
    </div>

  </div>

  <script>
    function goTable1() {
      window.location.href = "https://keepscore.app/184922";
    }

    function goTable3() {
      window.location.href = "https://keepscore.app/249163";
    }
  </script>

</body>
</html>
