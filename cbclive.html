<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cluses Billard Club – Choix de table</title>

  <style>
    :root {
      --bg: #050505;
      --text: #f5f5f5;
      --muted: #c8c8c8;
      --red-main: #d71920;
      --blue-main: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .logo {
      max-width: 120px;
      width: 40%;
      margin: 0 auto 20px;
      display: block;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
    }

    h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 24px;
    }

    .buttons {
      display: grid;
      gap: 16px;
    }

    .btn {
      padding: 18px;
      font-size: 1.3rem;
      font-weight: bold;
      border-radius: 18px;
      border: none;
      color: white;
      cursor: pointer;
      transition: 0.15s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.table1 {
      background: linear-gradient(180deg, var(--red-main), #a40f15);
    }

    .btn.table3 {
      background: linear-gradient(180deg, var(--blue-main), #1d4ed8);
    }

    .footer {
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="https://raw.githubusercontent.com/keep-score/keepscore/refs/heads/main/cluses-billard-club.png" class="logo" />

    <h1>Cluses Billard Club</h1>
    <div class="subtitle">Choisissez une table</div>

    <div class="buttons">
      <button class="btn table1" onclick="goTable1()">Table 1</button>
      <button class="btn table3" onclick="goTable3()">Table 3</button>
    </div>

    <div class="footer">
      Gestion du score en direct
    </div>
  </div>

  <script>
    function goTable1() {
      window.location.href = "https://keepscore.app/184922";
    }

    function goTable3() {
      window.location.href = "https://keepscore.app/249163";
    }
  </script>

</body>
</html>
