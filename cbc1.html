<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contrôleur Video Scoreboard</title>
  <style>
    :root {
      --bg: #0b0b0b;
      --panel: #171717;
      --panel-2: #202020;
      --text: #f4f4f4;
      --muted: #b8b8b8;
      --danger: #b3261e;
      --danger-hover: #8f1f19;
      --btn: #2a2a2a;
      --btn-hover: #3a3a3a;
      --green: #1f6f3f;
      --green-hover: #185832;
      --border: #3d3d3d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 900px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .hidden { display: none !important; }

    .setup {
      display: grid;
      gap: 16px;
      max-width: 520px;
      margin: 0 auto;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    label { font-weight: bold; }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      font-size: 1rem;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.15s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    .primary { background: var(--green); color: white; }
    .primary:hover { background: var(--green-hover); }
    .secondary { background: var(--btn); color: white; }
    .secondary:hover { background: var(--btn-hover); }
    .danger { background: var(--danger); color: white; }
    .danger:hover { background: var(--danger-hover); }

    .scoreboard-wrap { display: grid; gap: 20px; }

    .scoreboard {
      display: grid;
      grid-template-columns: 1fr 34px 1fr;
      gap: 10px;
      align-items: stretch;
    }

    .player-card {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      grid-template-rows: auto auto auto auto;
      gap: 8px;
      min-height: 0;
    }

    .player-name {
      text-align: center;
      font-size: 1.1rem;
      font-weight: bold;
      min-height: 2.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      word-break: break-word;
      line-height: 1.1;
      cursor: pointer;
    }

    .cueball {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      display: inline-block;
      position: relative;
      flex: 0 0 16px;
      box-shadow: 0 0 6px rgba(255,255,255,0.8);
    }

    .cueball::before {
      content: "";
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #d72626;
      top: 2px;
      left: 6px;
      box-shadow: -4px 7px 0 #d72626, 4px 7px 0 #d72626;
    }

    .cueball.hidden { visibility: hidden; }

    .score-btn {
      width: 100%;
      min-height: 48px;
      font-size: 1.6rem;
      background: var(--btn);
      color: white;
      padding: 8px 10px;
    }

    .score-btn:hover { background: var(--btn-hover); }

    .score-display {
      background: #0f0f0f;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 3.1rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 82px;
    }

    .separator {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: bold;
      color: var(--muted);
    }

    .preview-box {
      margin-top: 8px;
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #0f0f0f;
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      min-height: 82px;
      display: flex;
      align-items: center;
      justify-content: center;
      word-break: break-word;
    }

    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 6px;
    }

    .status {
      margin-top: 10px;
      text-align: center;
      color: var(--muted);
      min-height: 1.2em;
    }

    .live-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 6px;
      font-weight: bold;
      color: var(--text);
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #666;
      box-shadow: 0 0 6px rgba(255,255,255,0.15);
      flex: 0 0 10px;
    }

    .live-dot.ready {
      background: #32d74b;
      box-shadow: 0 0 8px rgba(50,215,75,0.7);
    }

    .live-dot.waiting {
      background: #ff9f0a;
      box-shadow: 0 0 8px rgba(255,159,10,0.6);
    }

    .live-dot.error {
      background: #ff453a;
      box-shadow: 0 0 8px rgba(255,69,58,0.6);
    }

    @media (max-width: 760px) {
      body {
        padding: 10px;
        align-items: flex-start;
      }

      .app {
        padding: 14px;
        border-radius: 14px;
      }

      h1 {
        font-size: 1.45rem;
        margin-bottom: 4px;
      }

      .subtitle {
        margin-bottom: 14px;
        font-size: 0.95rem;
      }

      .scoreboard-wrap { gap: 12px; }

      .scoreboard {
        grid-template-columns: 1fr 22px 1fr;
        gap: 8px;
      }

      .player-card {
        padding: 8px;
        gap: 6px;
      }

      .player-name {
        font-size: 0.95rem;
        min-height: 2.1em;
      }

      .score-btn {
        min-height: 42px;
        font-size: 1.35rem;
        padding: 6px 8px;
      }

      .score-display {
        font-size: 2.3rem;
        min-height: 66px;
      }

      .separator { font-size: 1.5rem; }

      .preview-box {
        margin-top: 0;
        padding: 12px;
        min-height: 58px;
        font-size: 1rem;
      }

      .actions {
        gap: 8px;
        margin-top: 0;
      }

      .actions button {
        flex: 1 1 calc(50% - 8px);
        padding: 12px 10px;
        font-size: 0.92rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div id="loginScreen">
      <h1>Contrôleur Video Scoreboard</h1>
      <div class="subtitle">Entrez le code d'accès.</div>

      <div class="setup">
        <div class="field">
          <label for="pinInput">Code</label>
          <input id="pinInput" type="password" inputmode="numeric" maxlength="12" placeholder="Code d'accès" />
        </div>

        <button id="loginBtn" class="primary">Valider</button>
        <div class="status" id="loginStatus"></div>
      </div>
    </div>

    <div id="mainApp" class="hidden">
      <div id="setupScreen">
        <h1>Contrôleur Video Scoreboard</h1>
        <div class="subtitle">Entrez les noms des joueurs.</div>

        <div class="setup">
          <div class="field">
            <label for="player1Input">Joueur 1</label>
            <input id="player1Input" type="text" maxlength="30" placeholder="Nom du joueur 1" />
          </div>

          <div class="field">
            <label for="player2Input">Joueur 2</label>
            <input id="player2Input" type="text" maxlength="30" placeholder="Nom du joueur 2" />
          </div>

          <button id="startBtn" class="primary">Démarrer le score</button>
          <div class="status" id="setupStatus"></div>
        </div>
      </div>

      <div id="scoreboardScreen" class="hidden scoreboard-wrap">
        <h1>Contrôleur Video Scoreboard</h1>

        <div class="scoreboard">
          <div class="player-card">
            <div class="player-name" id="player1Name">
              <span id="player1NameText">Joueur 1</span>
              <span id="cue1" class="cueball"></span>
            </div>
            <button class="score-btn secondary" id="p1Plus">+</button>
            <div class="score-display" id="score1Display">0</div>
            <button class="score-btn secondary" id="p1Minus">−</button>
          </div>

          <div class="separator">-</div>

          <div class="player-card">
            <div class="player-name" id="player2Name">
              <span id="player2NameText">Joueur 2</span>
              <span id="cue2" class="cueball hidden"></span>
            </div>
            <button class="score-btn secondary" id="p2Plus">+</button>
            <div class="score-display" id="score2Display">0</div>
            <button class="score-btn secondary" id="p2Minus">−</button>
          </div>
        </div>

        <div class="preview-box" id="previewBox"></div>

        <div class="actions">
          <button class="secondary" id="moveLeftBtn">← Déplacer à gauche</button>
          <button class="secondary" id="moveRightBtn">Déplacer à droite →</button>
          <button class="danger" id="resetBtn">Réinitialiser</button>
        </div>

        <div class="live-status">
          <span id="liveDot" class="live-dot waiting"></span>
          <span id="liveStatusText">Connexion...</span>
        </div>
        <div class="status" id="scoreStatus"></div>
      </div>
    </div>
  </div>

  <script>
    const path = window.location.pathname.split("/").filter(Boolean);
    const DWEET_THING = path[0] || "cbc1";
    const MIN_RECT = { rect0: 3000, rect2: 4400 };
    const MAX_RECT = { rect0: 6000, rect2: 7400 };
    const RECT_STEP = 200;
    const DEFAULT_RECT = { rect0: 4000, rect2: 5400 };
    const ADMIN_PIN = "2481";
    const PIN_SECRET = "cbc-club-secret";

    const state = {
      player1: "",
      player2: "",
      score1: 0,
      score2: 0,
      rect0: DEFAULT_RECT.rect0,
      rect2: DEFAULT_RECT.rect2,
      visible: 1,
    };

    let currentBreaker = 1;
    let livePollTimer = null;

    const loginScreen = document.getElementById("loginScreen");
    const mainApp = document.getElementById("mainApp");
    const pinInput = document.getElementById("pinInput");
    const loginBtn = document.getElementById("loginBtn");
    const loginStatus = document.getElementById("loginStatus");

    const setupScreen = document.getElementById("setupScreen");
    const scoreboardScreen = document.getElementById("scoreboardScreen");
    const player1Input = document.getElementById("player1Input");
    const player2Input = document.getElementById("player2Input");
    const startBtn = document.getElementById("startBtn");
    const setupStatus = document.getElementById("setupStatus");
    const scoreStatus = document.getElementById("scoreStatus");
    const player1Name = document.getElementById("player1Name");
    const player2Name = document.getElementById("player2Name");
    const player1NameText = document.getElementById("player1NameText");
    const player2NameText = document.getElementById("player2NameText");
    const score1Display = document.getElementById("score1Display");
    const score2Display = document.getElementById("score2Display");
    const previewBox = document.getElementById("previewBox");
    const cue1 = document.getElementById("cue1");
    const cue2 = document.getElementById("cue2");
    const liveDot = document.getElementById("liveDot");
    const liveStatusText = document.getElementById("liveStatusText");

    function getTodayPin() {
      const now = new Date();
      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");
      const source = `${PIN_SECRET}-${yyyy}${mm}${dd}-${DWEET_THING}`;

      let hash = 0;
      for (let i = 0; i < source.length; i += 1) {
        hash = (hash * 31 + source.charCodeAt(i)) % 1000000;
      }

      return String(hash).padStart(6, "0");
    }

    function getSessionKey() {
      return `score-auth-${DWEET_THING}`;
    }

    function isAuthorised() {
      const saved = localStorage.getItem(getSessionKey());
      return saved === getTodayPin() || saved === ADMIN_PIN;
    }

    function prefillPinFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const prefill = params.get("pin");
      if (prefill) {
        pinInput.value = prefill;
      }
    }

    function setLiveStatus(mode, text) {
      liveDot.classList.remove("ready", "waiting", "error");
      if (mode) liveDot.classList.add(mode);
      liveStatusText.textContent = text;
    }

    function applyLatestDweetState(latest) {
      if (!latest) return;

      const latestVisible = String(latest.visible ?? "1").trim();
      const latestDisplay = String(latest.display || "").trim();
      const rect0 = parseInt(latest.rect0 ?? DEFAULT_RECT.rect0, 10);
      const rect2 = parseInt(latest.rect2 ?? DEFAULT_RECT.rect2, 10);
      const latestBreaker = parseInt(latest.breaker ?? "1", 10);

      state.rect0 = Number.isFinite(rect0) ? rect0 : DEFAULT_RECT.rect0;
      state.rect2 = Number.isFinite(rect2) ? rect2 : DEFAULT_RECT.rect2;
      currentBreaker = latestBreaker === 2 ? 2 : 1;

      if (latestVisible === "0" || !latestDisplay) {
        state.player1 = "";
        state.player2 = "";
        state.score1 = 0;
        state.score2 = 0;
        state.visible = 0;
        renderScoreboard();
        setupScreen.classList.remove("hidden");
        scoreboardScreen.classList.add("hidden");
        return;
      }

      const match = latestDisplay.match(/^(.*)\s+(\d+)\s+-\s+(\d+)\s+(.*)$/);
      if (!match) return;

      state.player1 = match[1].trim() || "Joueur 1";
      state.score1 = parseInt(match[2], 10) || 0;
      state.score2 = parseInt(match[3], 10) || 0;
      state.player2 = match[4].trim() || "Joueur 2";
      state.visible = 1;
      renderScoreboard();
      setupScreen.classList.add("hidden");
      scoreboardScreen.classList.remove("hidden");
    }

    function updateCue() {
      if (currentBreaker === 1) {
        cue1.classList.remove("hidden");
        cue2.classList.add("hidden");
      } else {
        cue1.classList.add("hidden");
        cue2.classList.remove("hidden");
      }
    }

    function buildDisplayString() {
      return `${state.player1} ${state.score1} - ${state.score2} ${state.player2}`;
    }

    function renderScoreboard() {
      player1NameText.textContent = state.player1;
      player2NameText.textContent = state.player2;
      score1Display.textContent = state.score1;
      score2Display.textContent = state.score2;
      previewBox.textContent = state.visible ? buildDisplayString() : "";
      updateCue();
    }

    async function fetchLatestDweet() {
      const response = await fetch(`https://dweet.cc/get/latest/dweet/for/${encodeURIComponent(DWEET_THING)}?t=${Date.now()}`, {
        method: "GET",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();
      return data && data.with && data.with.length ? data.with[0].content : null;
    }

    async function restoreFromLatestDweet() {
      try {
        const latest = await fetchLatestDweet();
        if (!latest) {
          setupScreen.classList.remove("hidden");
          scoreboardScreen.classList.add("hidden");
          return;
        }
        applyLatestDweetState(latest);
      } catch (error) {
        console.error(error);
        setupScreen.classList.remove("hidden");
        scoreboardScreen.classList.add("hidden");
      }
    }

    async function checkLatestDweet() {
      try {
        const latest = await fetchLatestDweet();

        if (!latest) {
          setLiveStatus("waiting", "En attente...");
          return;
        }

        const latestDisplay = String(latest.display || "").trim();
        const latestVisible = String(latest.visible ?? "1").trim();
        const latestBreaker = String(latest.breaker ?? "1").trim();

        const currentDisplay = buildDisplayString();
        const currentVisible = String(state.visible);
        const currentBreakerString = String(currentBreaker);

        if (
          latestDisplay !== currentDisplay ||
          latestVisible !== currentVisible ||
          latestBreaker !== currentBreakerString
        ) {
          applyLatestDweetState(latest);
        }

        const refreshedDisplay = buildDisplayString();
        const refreshedVisible = String(state.visible);
        const refreshedBreaker = String(currentBreaker);

        if (
          latestDisplay === refreshedDisplay &&
          latestVisible === refreshedVisible &&
          latestBreaker === refreshedBreaker
        ) {
          setLiveStatus("ready", "Prêt");
        } else {
          setLiveStatus("waiting", "Synchronisation...");
        }
      } catch (error) {
        console.error(error);
        setLiveStatus("error", "Erreur connexion");
      }
    }

    function startLivePolling() {
      if (livePollTimer) return;
      checkLatestDweet();
      livePollTimer = window.setInterval(checkLatestDweet, 1000);
    }

    async function sendState(statusElement) {
      const params = new URLSearchParams({
        display: buildDisplayString(),
        rect0: String(state.rect0),
        rect2: String(state.rect2),
        visible: String(state.visible),
        breaker: String(currentBreaker),
        ts: String(Date.now())
      });

      const url = `https://dweet.cc/dweet/for/${encodeURIComponent(DWEET_THING)}?${params.toString()}`;
      statusElement.textContent = "Envoi en cours...";

      const response = await fetch(url, { method: "GET", cache: "no-store" });
      const raw = await response.text();

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      try {
        JSON.parse(raw);
      } catch (err) {
        console.warn("Réponse non JSON ou vide:", raw);
      }

      statusElement.textContent = "Commande envoyée.";
      setLiveStatus("waiting", "Synchronisation...");
    }

    async function grantAccess(pin) {
      localStorage.setItem(getSessionKey(), pin);
      loginScreen.classList.add("hidden");
      mainApp.classList.remove("hidden");
      pinInput.value = "";
      loginStatus.textContent = "";
      await restoreFromLatestDweet();
    }

    async function tryLogin() {
      const entered = pinInput.value.trim();
      const todayPin = getTodayPin();

      if (entered === todayPin || entered === ADMIN_PIN) {
        await grantAccess(entered);
      } else {
        loginStatus.textContent = "Code incorrect.";
      }
    }

    async function startScoreboard() {
      const p1 = player1Input.value.trim() || "Joueur 1";
      const p2 = player2Input.value.trim() || "Joueur 2";

      state.player1 = p1;
      state.player2 = p2;
      state.score1 = 0;
      state.score2 = 0;
      state.rect0 = DEFAULT_RECT.rect0;
      state.rect2 = DEFAULT_RECT.rect2;
      state.visible = 1;
      currentBreaker = 1;

      renderScoreboard();

      try {
        await sendState(setupStatus);
        setupStatus.textContent = "Score démarré.";
        setupScreen.classList.add("hidden");
        scoreboardScreen.classList.remove("hidden");
      } catch (error) {
        console.error(error);
        setupStatus.textContent = "Erreur lors de l'envoi à dweet.";
      }
    }

    async function updateAndSend(mutator) {
      mutator();
      renderScoreboard();

      try {
        await sendState(scoreStatus);
      } catch (error) {
        console.error(error);
        scoreStatus.textContent = "Erreur lors de l'envoi à dweet.";
      }
    }

    loginBtn.addEventListener("click", () => { tryLogin(); });

    pinInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") tryLogin();
    });

    startBtn.addEventListener("click", startScoreboard);

    player1Input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") player2Input.focus();
    });

    player2Input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") startScoreboard();
    });

    player1Name.addEventListener("click", () => updateAndSend(() => {
      currentBreaker = currentBreaker === 1 ? 2 : 1;
    }));

    player2Name.addEventListener("click", () => updateAndSend(() => {
      currentBreaker = currentBreaker === 1 ? 2 : 1;
    }));

    document.getElementById("p1Plus").addEventListener("click", () => updateAndSend(() => {
      state.score1 += 1;
      currentBreaker = currentBreaker === 1 ? 2 : 1;
    }));

    document.getElementById("p1Minus").addEventListener("click", () => updateAndSend(() => {
      state.score1 = Math.max(0, state.score1 - 1);
    }));

    document.getElementById("p2Plus").addEventListener("click", () => updateAndSend(() => {
      state.score2 += 1;
      currentBreaker = currentBreaker === 1 ? 2 : 1;
    }));

    document.getElementById("p2Minus").addEventListener("click", () => updateAndSend(() => {
      state.score2 = Math.max(0, state.score2 - 1);
    }));

    document.getElementById("moveLeftBtn").addEventListener("click", () => updateAndSend(() => {
      state.rect0 = Math.max(MIN_RECT.rect0, state.rect0 - RECT_STEP);
      state.rect2 = Math.max(MIN_RECT.rect2, state.rect2 - RECT_STEP);
    }));

    document.getElementById("moveRightBtn").addEventListener("click", () => updateAndSend(() => {
      state.rect0 = Math.min(MAX_RECT.rect0, state.rect0 + RECT_STEP);
      state.rect2 = Math.min(MAX_RECT.rect2, state.rect2 + RECT_STEP);
    }));

    document.getElementById("resetBtn").addEventListener("click", async () => {
      if (!confirm("Réinitialiser le score et revenir à l'écran de départ ?")) {
        return;
      }

      const previous = { ...state };
      const previousBreaker = currentBreaker;

      state.player1 = "Joueur 1";
      state.player2 = "Joueur 2";
      state.score1 = 0;
      state.score2 = 0;
      state.rect0 = DEFAULT_RECT.rect0;
      state.rect2 = DEFAULT_RECT.rect2;
      state.visible = 1;
      currentBreaker = 1;
      renderScoreboard();

      try {
        await sendState(scoreStatus);
        state.visible = 0;
        renderScoreboard();
        await sendState(scoreStatus);

        player1Input.value = "";
        player2Input.value = "";
        setupStatus.textContent = "";
        scoreStatus.textContent = "";
        setupScreen.classList.remove("hidden");
        scoreboardScreen.classList.add("hidden");
      } catch (error) {
        console.error(error);
        Object.assign(state, previous);
        currentBreaker = previousBreaker;
        renderScoreboard();
        scoreStatus.textContent = "Erreur lors de la réinitialisation.";
      }
    });

    prefillPinFromUrl();
    startLivePolling();

    if (isAuthorised()) {
      loginScreen.classList.add("hidden");
      mainApp.classList.remove("hidden");
      restoreFromLatestDweet();
    } else {
      loginScreen.classList.remove("hidden");
      mainApp.classList.add("hidden");
    }
  </script>
</body>
</html>
