<script>
  const path = window.location.pathname.split("/").filter(Boolean);
  const DWEET_THING = path[0] || "cbc1";
  const MIN_RECT = { rect0: 3000, rect2: 4400 };
  const MAX_RECT = { rect0: 6000, rect2: 7400 };
  const RECT_STEP = 200;
  const DEFAULT_RECT = { rect0: 4000, rect2: 5400 };
  const DEFAULT_DISPLAY = "Joueur 1 0 - 0 Joueur 2";

  const state = {
    player1: "",
    player2: "",
    score1: 0,
    score2: 0,
    rect0: DEFAULT_RECT.rect0,
    rect2: DEFAULT_RECT.rect2,
    visible: 1,
  };

  let currentBreaker = 1;
  let lastSeenRemoteKey = "";

  const setupScreen = document.getElementById("setupScreen");
  const scoreboardScreen = document.getElementById("scoreboardScreen");
  const player1Input = document.getElementById("player1Input");
  const player2Input = document.getElementById("player2Input");
  const startBtn = document.getElementById("startBtn");
  const setupStatus = document.getElementById("setupStatus");
  const scoreStatus = document.getElementById("scoreStatus");
  const player1Name = document.getElementById("player1Name");
  const player2Name = document.getElementById("player2Name");
  const player1NameText = document.getElementById("player1NameText");
  const player2NameText = document.getElementById("player2NameText");
  const score1Display = document.getElementById("score1Display");
  const score2Display = document.getElementById("score2Display");
  const previewBox = document.getElementById("previewBox");
  const cue1 = document.getElementById("cue1");
  const cue2 = document.getElementById("cue2");

  function updateCue() {
    if (currentBreaker === 1) {
      cue1.classList.remove("hidden");
      cue2.classList.add("hidden");
    } else {
      cue1.classList.add("hidden");
      cue2.classList.remove("hidden");
    }
  }

  function buildDisplayString() {
    return `${state.player1} ${state.score1} - ${state.score2} ${state.player2}`;
  }

  function renderScoreboard() {
    player1NameText.textContent = state.player1;
    player2NameText.textContent = state.player2;
    score1Display.textContent = state.score1;
    score2Display.textContent = state.score2;
    previewBox.textContent = state.visible ? buildDisplayString() : "";
    updateCue();
  }

  function parseDisplayString(display) {
    const match = String(display).match(/^(.*?)\s+(\d+)\s*-\s*(\d+)\s+(.*?)$/);
    if (!match) return null;

    return {
      player1: match[1].trim(),
      score1: Number(match[2]),
      score2: Number(match[3]),
      player2: match[4].trim(),
    };
  }

  function isDefaultMatchState(display, visible) {
    return !visible || String(display).trim() === DEFAULT_DISPLAY;
  }

  function makeRemoteKey(latest) {
    return JSON.stringify({
      display: latest.display ?? "",
      rect0: latest.rect0 ?? "",
      rect2: latest.rect2 ?? "",
      visible: latest.visible ?? "",
      created: latest.created ?? ""
    });
  }

  async function fetchLatestState() {
    const url = `https://dweet.cc/get/latest/dweet/for/${encodeURIComponent(DWEET_THING)}?ts=${Date.now()}`;
    const response = await fetch(url, { method: "GET", cache: "no-store" });

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    const data = await response.json();
    const latest = data?.with?.[0];

    if (!latest?.content) return null;

    return {
      ...latest.content,
      created: latest.created || ""
    };
  }

  function applyRemoteState(latest) {
    const latestDisplay = typeof latest.display === "string" ? latest.display.trim() : "";
    const latestVisible = Number(latest.visible ?? 1);

    if (isDefaultMatchState(latestDisplay, latestVisible)) {
      player1Input.value = "";
      player2Input.value = "";
      setupStatus.textContent = "";
      scoreStatus.textContent = "";

      state.player1 = "";
      state.player2 = "";
      state.score1 = 0;
      state.score2 = 0;
      state.rect0 = DEFAULT_RECT.rect0;
      state.rect2 = DEFAULT_RECT.rect2;
      state.visible = 1;
      currentBreaker = 1;

      setupScreen.classList.remove("hidden");
      scoreboardScreen.classList.add("hidden");
      return;
    }

    const parsed = parseDisplayString(latestDisplay);
    if (!parsed) return;

    state.player1 = parsed.player1 || "Joueur 1";
    state.player2 = parsed.player2 || "Joueur 2";
    state.score1 = Number.isFinite(parsed.score1) ? parsed.score1 : 0;
    state.score2 = Number.isFinite(parsed.score2) ? parsed.score2 : 0;
    state.rect0 = Number(latest.rect0) || DEFAULT_RECT.rect0;
    state.rect2 = Number(latest.rect2) || DEFAULT_RECT.rect2;
    state.visible = latestVisible ? 1 : 0;

    renderScoreboard();
    setupScreen.classList.add("hidden");
    scoreboardScreen.classList.remove("hidden");
  }

  async function restoreExistingMatchIfAny() {
    setupStatus.textContent = "Vérification du match en cours...";

    try {
      const latest = await fetchLatestState();

      if (!latest) {
        setupStatus.textContent = "";
        return;
      }

      lastSeenRemoteKey = makeRemoteKey(latest);
      applyRemoteState(latest);
      setupStatus.textContent = "";
      scoreStatus.textContent = scoreboardScreen.classList.contains("hidden")
        ? ""
        : "Match en cours chargé.";
    } catch (error) {
      console.error(error);
      setupStatus.textContent = "";
    }
  }

  async function pollForRemoteChanges() {
    try {
      const latest = await fetchLatestState();
      if (!latest) return;

      const remoteKey = makeRemoteKey(latest);
      if (remoteKey === lastSeenRemoteKey) return;

      lastSeenRemoteKey = remoteKey;
      applyRemoteState(latest);

      if (!scoreboardScreen.classList.contains("hidden")) {
        scoreStatus.textContent = "Mise à jour reçue.";
      }
    } catch (error) {
      console.error("Polling error:", error);
    }
  }

  async function sendState(statusElement) {
    const params = new URLSearchParams({
      display: buildDisplayString(),
      rect0: String(state.rect0),
      rect2: String(state.rect2),
      visible: String(state.visible),
      ts: String(Date.now())
    });

    const url = `https://dweet.cc/dweet/for/${encodeURIComponent(DWEET_THING)}?${params.toString()}`;
    statusElement.textContent = "Envoi en cours...";

    const response = await fetch(url, { method: "GET", cache: "no-store" });
    const raw = await response.text();

    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }

    try {
      JSON.parse(raw);
    } catch (err) {
      console.warn("Réponse non JSON ou vide:", raw);
    }

    statusElement.textContent = "Commande envoyée.";

    lastSeenRemoteKey = JSON.stringify({
      display: buildDisplayString(),
      rect0: state.rect0,
      rect2: state.rect2,
      visible: state.visible,
      created: ""
    });
  }

  async function startScoreboard() {
    const p1 = player1Input.value.trim() || "Joueur 1";
    const p2 = player2Input.value.trim() || "Joueur 2";

    state.player1 = p1;
    state.player2 = p2;
    state.score1 = 0;
    state.score2 = 0;
    state.rect0 = DEFAULT_RECT.rect0;
    state.rect2 = DEFAULT_RECT.rect2;
    state.visible = 1;
    currentBreaker = 1;

    renderScoreboard();

    try {
      await sendState(setupStatus);
      setupStatus.textContent = "Score démarré.";
      setupScreen.classList.add("hidden");
      scoreboardScreen.classList.remove("hidden");
    } catch (error) {
      console.error(error);
      setupStatus.textContent = "Erreur lors de l'envoi à dweet.";
    }
  }

  async function updateAndSend(mutator) {
    mutator();
    renderScoreboard();

    try {
      await sendState(scoreStatus);
    } catch (error) {
      console.error(error);
      scoreStatus.textContent = "Erreur lors de l'envoi à dweet.";
    }
  }

  startBtn.addEventListener("click", startScoreboard);

  player1Input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") player2Input.focus();
  });

  player2Input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") startScoreboard();
  });

  player1Name.addEventListener("click", () => {
    currentBreaker = currentBreaker === 1 ? 2 : 1;
    updateCue();
  });

  player2Name.addEventListener("click", () => {
    currentBreaker = currentBreaker === 1 ? 2 : 1;
    updateCue();
  });

  document.getElementById("p1Plus").addEventListener("click", () => updateAndSend(() => {
    state.score1 += 1;
    currentBreaker = currentBreaker === 1 ? 2 : 1;
  }));

  document.getElementById("p1Minus").addEventListener("click", () => updateAndSend(() => {
    state.score1 = Math.max(0, state.score1 - 1);
  }));

  document.getElementById("p2Plus").addEventListener("click", () => updateAndSend(() => {
    state.score2 += 1;
    currentBreaker = currentBreaker === 1 ? 2 : 1;
  }));

  document.getElementById("p2Minus").addEventListener("click", () => updateAndSend(() => {
    state.score2 = Math.max(0, state.score2 - 1);
  }));

  document.getElementById("moveLeftBtn").addEventListener("click", () => updateAndSend(() => {
    state.rect0 = Math.max(MIN_RECT.rect0, state.rect0 - RECT_STEP);
    state.rect2 = Math.max(MIN_RECT.rect2, state.rect2 - RECT_STEP);
  }));

  document.getElementById("moveRightBtn").addEventListener("click", () => updateAndSend(() => {
    state.rect0 = Math.min(MAX_RECT.rect0, state.rect0 + RECT_STEP);
    state.rect2 = Math.min(MAX_RECT.rect2, state.rect2 + RECT_STEP);
  }));

  document.getElementById("resetBtn").addEventListener("click", async () => {
    if (!confirm("Réinitialiser le score et revenir à l'écran de départ ?")) {
      return;
    }

    const previous = { ...state };
    const previousBreaker = currentBreaker;

    state.player1 = "Joueur 1";
    state.player2 = "Joueur 2";
    state.score1 = 0;
    state.score2 = 0;
    state.rect0 = DEFAULT_RECT.rect0;
    state.rect2 = DEFAULT_RECT.rect2;
    state.visible = 1;
    currentBreaker = 1;
    renderScoreboard();

    try {
      await sendState(scoreStatus);
      state.visible = 0;
      renderScoreboard();
      await sendState(scoreStatus);

      player1Input.value = "";
      player2Input.value = "";
      setupStatus.textContent = "";
      scoreStatus.textContent = "";
      setupScreen.classList.remove("hidden");
      scoreboardScreen.classList.add("hidden");
    } catch (error) {
      console.error(error);
      Object.assign(state, previous);
      currentBreaker = previousBreaker;
      renderScoreboard();
      scoreStatus.textContent = "Erreur lors de la réinitialisation.";
    }
  });

  restoreExistingMatchIfAny();
  setInterval(pollForRemoteChanges, 1000);
</script>
