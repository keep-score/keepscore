<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Cluses Billard Club</title>

  <style>
    :root {
      --bg: #050505;
      --text: #f5f5f5;
      --muted: #c8c8c8;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      padding: 6px 10px 10px;
    }

    .app {
      width: 100%;
      max-width: 1300px;
      margin: 0 auto;
    }

    .top-logo-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 4px 0 10px;
    }

    .top-logo {
      max-width: 110px;
      width: 20vw;
      height: auto;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.35));
    }

    h1 {
      margin: 0 0 6px;
      font-size: clamp(1.2rem, 2vw, 1.9rem);
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      margin-bottom: 14px;
      font-size: clamp(0.85rem, 1.3vw, 1rem);
    }

    .setup {
      display: grid;
      gap: 14px;
      max-width: 540px;
      margin: 0 auto;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 18px;
    }

    .buttons {
      display: grid;
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 16px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: pointer;
      background: #2b2b2b;
      color: white;
      transition: 0.15s ease;
      appearance: none;
      -webkit-appearance: none;
    }

    button:hover {
      transform: translateY(-1px);
      background: #383838;
    }

    button:active {
      transform: translateY(0);
    }

    .url-box {
      display: block;
      text-align: center;
      color: white;
      background: #1b1b1b;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 14px;
      font-size: 0.95rem;
      word-break: break-word;
      text-decoration: none;
    }

    .url-box:hover {
      background: #252525;
    }

    .back-button {
      justify-self: center;
      margin-top: 4px;
      padding: 8px 14px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: normal;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .back-button:hover {
      background: rgba(255,255,255,0.08);
      color: white;
      transform: translateY(-1px);
    }

    .hidden {
      display: none;
    }

    @media (orientation: landscape) {
      body {
        padding: 4px 8px 8px;
      }

      .top-logo-wrap {
        padding: 2px 0 8px;
      }

      .top-logo {
        max-width: 90px;
        width: 10vw;
      }

      .subtitle {
        margin-bottom: 10px;
      }
    }
  </style>

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
</head>

<body>
  <div class="app">
    <div class="top-logo-wrap">
      <img src="https://raw.githubusercontent.com/keep-score/keepscore/refs/heads/main/cluses-billard-club.png" alt="Cluses Billard Club" class="top-logo">
    </div>

    <h1>Cluses Billard Club</h1>
    <div class="subtitle" id="subtitle">Choisissez une option</div>

    <div class="setup">
      <div id="homeScreen" class="buttons">
        <button onclick="showLive()">Regarder le live</button>
        <button onclick="showTables()">Gérer le score vidéo</button>
      </div>

      <div id="liveScreen" class="buttons hidden">
        <a class="url-box" id="youtubeLink" href="https://www.youtube.com/@ClusesBillardClub" target="_blank" rel="noopener">
          https://www.youtube.com/@ClusesBillardClub
        </a>

        <button onclick="goLive()">Regarder sur YouTube</button>
        <button onclick="shareLive()">Partager le lien</button>
        <button class="back-button" onclick="showHome()">← Retour</button>
      </div>

      <div id="tableScreen" class="buttons hidden">
        <button onclick="goTable1()">Table 1</button>
        <button onclick="goTable3()">Table 3</button>
        <button class="back-button" onclick="showHome()">← Retour</button>
      </div>
    </div>
  </div>

  <script>
    const youtubeUrl = "https://www.youtube.com/@ClusesBillardClub";

    function hideAllScreens() {
      document.getElementById("homeScreen").classList.add("hidden");
      document.getElementById("liveScreen").classList.add("hidden");
      document.getElementById("tableScreen").classList.add("hidden");
    }

    function showHome() {
      hideAllScreens();
      document.getElementById("homeScreen").classList.remove("hidden");
      document.getElementById("subtitle").textContent = "Choisissez une option";
    }

    function showLive() {
      hideAllScreens();
      document.getElementById("liveScreen").classList.remove("hidden");
      document.getElementById("subtitle").textContent = "Regarder le live";
    }

    function showTables() {
      hideAllScreens();
      document.getElementById("tableScreen").classList.remove("hidden");
      document.getElementById("subtitle").textContent = "Choisissez une table";
    }

    function goLive() {
      window.location.href = youtubeUrl;
    }

    async function shareLive() {
      if (navigator.share) {
        try {
          await navigator.share({
            title: "Cluses Billard Club",
            text: "Regarder le live du Cluses Billard Club :",
            url: youtubeUrl
          });
        } catch (error) {
          // User cancelled sharing - no problem.
        }
      } else {
        try {
          await navigator.clipboard.writeText(youtubeUrl);
          alert("Lien copié !");
        } catch (error) {
          alert("Impossible de partager automatiquement. Vous pouvez copier le lien affiché.");
        }
      }
    }

    function goTable1() {
      window.location.href = "https://keepscore.app/184922";
    }

    function goTable3() {
      window.location.href = "https://keepscore.app/249163";
    }
  </script>
</body>
</html>
